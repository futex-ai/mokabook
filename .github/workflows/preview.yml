name: Preview

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_PROJECT_NAME: mokabook
  MOKABOOK_COMMENT_MARKER: "<!-- mokabook-preview -->"

jobs:
  deploy-main:
    name: Deploy Main Preview
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Validate Cloudflare configuration
        run: |
          missing=0
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error title=Missing CLOUDFLARE_ACCOUNT_ID::Set repository variable CLOUDFLARE_ACCOUNT_ID."
            missing=1
          fi
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error title=Missing Cloudflare API token::Set repository secret CLOUDFLARE_PAGES_API_TOKEN or CLOUDFLARE_API_TOKEN."
            missing=1
          fi
          exit "${missing}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
      - name: Install dependencies
        run: npm ci
      - name: Build Mokabook preview
        run: npm run preview:build
      - name: Deploy main preview
        run: npx --no-install wrangler pages deploy .context/mokabook-preview --project-name "${CLOUDFLARE_PROJECT_NAME}" --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}

  deploy-pr:
    name: Deploy PR Preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !(
        startsWith(github.event.pull_request.head.ref, 'release-please--') ||
        contains(join(github.event.pull_request.labels.*.name, ','), 'autorelease:')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Validate Cloudflare configuration
        run: |
          missing=0
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error title=Missing CLOUDFLARE_ACCOUNT_ID::Set repository variable CLOUDFLARE_ACCOUNT_ID."
            missing=1
          fi
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error title=Missing Cloudflare API token::Set repository secret CLOUDFLARE_PAGES_API_TOKEN or CLOUDFLARE_API_TOKEN."
            missing=1
          fi
          exit "${missing}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
      - name: Install dependencies
        run: npm ci
      - name: Build Mokabook preview
        run: npm run preview:build
      - name: Deploy Mokabook preview
        id: deploy
        run: |
          branch="pr-${{ github.event.pull_request.number }}"
          npx --no-install wrangler pages deploy .context/mokabook-preview \
            --project-name "${CLOUDFLARE_PROJECT_NAME}" \
            --branch "${branch}"
          echo "branch=${branch}" >> "${GITHUB_OUTPUT}"
          echo "url=https://${branch}.${CLOUDFLARE_PROJECT_NAME}.pages.dev" >> "${GITHUB_OUTPUT}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
      - name: Comment on pull request
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          DEPLOY_STATUS: ${{ job.status }}
          PREVIEW_BRANCH: ${{ steps.deploy.outputs.branch }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const marker = process.env.MOKABOOK_COMMENT_MARKER;
            const lines = [
              marker,
              "### Mokabook preview",
              "",
              "Status: **" + process.env.DEPLOY_STATUS + "**",
              "- Preview: " + (process.env.PREVIEW_URL || "unavailable"),
              "- Cloudflare branch: " + (process.env.PREVIEW_BRANCH || "unknown"),
              "- Commit: " + context.payload.pull_request.head.sha,
              "- Workflow: " + context.serverUrl + "/" + context.repo.owner + "/" + context.repo.repo + "/actions/runs/" + context.runId,
            ];
            const body = lines.join("\n");
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

  close-pr:
    name: Close PR Preview
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Delete Cloudflare Pages PR deployments
        id: cleanup
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}
        run: |
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ] || [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "status=retained: missing Cloudflare configuration" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          api_root="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PROJECT_NAME}"
          deployments_file="$(mktemp)"
          if ! deployments_status="$(
            curl --silent --show-error --write-out "%{http_code}" --output "${deployments_file}" \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "${api_root}/deployments?per_page=100"
          )"; then
            echo "status=retained: failed to list Cloudflare deployments" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${deployments_status}" -lt 200 ] || [ "${deployments_status}" -ge 300 ]; then
            list_error="$(jq -r '[.errors[]?.message] | join("; ")' "${deployments_file}" 2>/dev/null || true)"
            if [ -z "${list_error}" ]; then
              list_error="HTTP ${deployments_status}"
            else
              list_error="HTTP ${deployments_status}: ${list_error}"
            fi
            echo "status=retained: failed to list Cloudflare deployments (${list_error})" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ! deployments="$(jq -r --arg branch "${PREVIEW_BRANCH}" '.result[]? | select(.deployment_trigger.metadata.branch == $branch) | .id' "${deployments_file}")"; then
            echo "status=retained: failed to parse Cloudflare deployments response" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [ -z "${deployments}" ]; then
            echo "status=deleted: no matching branch deployments found" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          deleted_count=0
          failed_delete_count=0
          while IFS= read -r deployment_id; do
            [ -z "${deployment_id}" ] && continue
            delete_file="$(mktemp)"
            if ! delete_status="$(
              curl --silent --show-error --write-out "%{http_code}" --output "${delete_file}" \
                --request DELETE \
                --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                "${api_root}/deployments/${deployment_id}?force=true"
            )"; then
              failed_delete_count=$((failed_delete_count + 1))
              echo "::warning title=Cloudflare deployment cleanup failed::Deployment ${deployment_id} delete request failed."
              continue
            fi
            if [ "${delete_status}" -ge 200 ] && [ "${delete_status}" -lt 300 ]; then
              deleted_count=$((deleted_count + 1))
              continue
            fi
            delete_error="$(jq -r '[.errors[]?.message] | join("; ")' "${delete_file}" 2>/dev/null || true)"
            if [ -z "${delete_error}" ]; then
              delete_error="HTTP ${delete_status}"
            else
              delete_error="HTTP ${delete_status}: ${delete_error}"
            fi
            failed_delete_count=$((failed_delete_count + 1))
            echo "::warning title=Cloudflare deployment cleanup failed::Deployment ${deployment_id}: ${delete_error}"
          done <<EOF
          ${deployments}
          EOF

          if [ "${failed_delete_count}" -gt 0 ]; then
            echo "status=retained: failed to delete ${failed_delete_count} Cloudflare deployment(s); deleted ${deleted_count}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "status=deleted: removed ${deleted_count} matching branch deployment(s)" >> "${GITHUB_OUTPUT}"
      - name: Mark preview inactive
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          CLEANUP_STATUS: ${{ steps.cleanup.outputs.status }}
          PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}
        with:
          script: |
            const marker = process.env.MOKABOOK_COMMENT_MARKER;
            const lines = [
              marker,
              "### Mokabook preview",
              "",
              "Status: **inactive**",
              "- Cloudflare branch: " + process.env.PREVIEW_BRANCH,
              "- Cleanup: " + (process.env.CLEANUP_STATUS || "retained: cleanup status unavailable"),
              "- PR closed at workflow: " + context.serverUrl + "/" + context.repo.owner + "/" + context.repo.repo + "/actions/runs/" + context.runId,
            ];
            const body = lines.join("\n");
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
