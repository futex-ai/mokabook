name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  minimum-runtime:
    name: Minimum Node 22.14
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22.14.0
          package-manager-cache: false
      - name: Set up npm
        run: npm install --global npm@11.7.0
      - name: Set up Rust
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.95.0
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run complete verification
        run: cargo xtask check

  release-runtime:
    name: Release Node 24
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Set up npm
        run: npm install --global npm@11.7.0
      - name: Set up Rust
        run: |
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.95.0
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run complete verification
        run: cargo xtask check

  required:
    name: Required CI
    if: always()
    needs: [minimum-runtime, release-runtime]
    runs-on: ubuntu-latest
    steps:
      - name: Require every verification job
        env:
          MINIMUM_RESULT: ${{ needs.minimum-runtime.result }}
          RELEASE_RESULT: ${{ needs.release-runtime.result }}
        run: |
          test "$MINIMUM_RESULT" = success
          test "$RELEASE_RESULT" = success
